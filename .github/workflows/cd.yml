name: deploy-frontend

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_FRONTEND_REPOSITORY: ${{ vars.ECR_FRONTEND_REPOSITORY }}
  EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        env:
          REGISTRY: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg VITE_API_URL=/api \
            -t $REGISTRY/$ECR_FRONTEND_REPOSITORY:$IMAGE_TAG .
          docker tag $REGISTRY/$ECR_FRONTEND_REPOSITORY:$IMAGE_TAG $REGISTRY/$ECR_FRONTEND_REPOSITORY:latest
          docker push $REGISTRY/$ECR_FRONTEND_REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$ECR_FRONTEND_REPOSITORY:latest

      - name: Deploy frontend via SSM
        run: |
          aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy frontend" \
            --parameters 'commands=[
              "sudo sh -c '\''if [ ! -f /opt/app/.env ]; then touch /opt/app/.env; fi'\''",
              "sudo sh -c '\''grep -v ^ECR_FRONT_IMAGE= /opt/app/.env > /opt/app/.env.tmp || true'\''",
              "sudo sh -c '\''echo ECR_FRONT_IMAGE=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPOSITORY }}:${{ github.sha }} >> /opt/app/.env.tmp'\''",
              "sudo sh -c '\''if ! grep -q ^AWS_REGION= /opt/app/.env.tmp; then echo AWS_REGION=${{ env.AWS_REGION }} >> /opt/app/.env.tmp; fi'\''",
              "sudo sh -c '\''if ! grep -q ^AWS_ACCOUNT_ID= /opt/app/.env.tmp; then echo AWS_ACCOUNT_ID=${{ env.AWS_ACCOUNT_ID }} >> /opt/app/.env.tmp; fi'\''",
              "sudo sh -c '\''mv /opt/app/.env.tmp /opt/app/.env'\''",
              "sudo chmod 600 /opt/app/.env",
              "cd /opt/app && sudo ./deploy.sh"
            ]' \
            --region "$AWS_REGION"
