  <polygon points="32,14 46.25,22.5 46.25,39.5 32,48 17.75,39.5 17.75,22.5" fill="none" stroke="rgba(0,180,255,0.4)" stroke-width="1"></polygon>

  
  <polygon points="35,14 26,33 31,33 29,50 38,31 33,31 40,14" fill="url(#bolt)" filter="url(#glow)"></polygon>
