<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(0,180,255,0.25)"></stop>
      <stop offset="100%" stop-color="rgba(120,60,220,0.25)"></stop>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b4ff"></stop>
      <stop offset="100%" stop-color="#7840dc"></stop>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#78dcff"></stop>
      <stop offset="50%" stop-color="#00b4ff"></stop>
